  function getLinksForRequirement(linkKey) {
    return PERMANENT_LINKS[linkKey] || [];
  }

  function renderLinksForRequirement(linkKey, containerId) {
    const links = getLinksForRequirement(linkKey);
    const container = document.getElementById(containerId);
    if (!container) return;

    if (links.length === 0) {
      container.innerHTML = `<div class="empty-links"><i class="fas fa-info-circle"></i> No evidence links added yet. Edit the PERMANENT_LINKS object in the HTML to add your URLs.</div>`;
      return;
    }

    let html = `<div class="links-list">`;
    links.forEach((link) => {
      const displayLabel = link.label ? `${escapeHtml(link.label)} – ` : '';
      html += `
        <div class="link-item">
          <div class="link-url-display">
            ${displayLabel}<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer"><i class="fas fa-external-link-alt"></i> ${truncateUrl(escapeHtml(link.url))}</a>
          </div>
        </div>
      `;
    });
    html += `</div>`;
    container.innerHTML = html;
  }

  function renderSocialLinks() {
    const container = document.getElementById("socialLinksContainer");
    if (!container) return;
    
    let html = '';
    SOCIAL_LINKS.forEach(link => {
      const driveClass = link.isDrive ? 'drive-link' : '';
      html += `<a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="social-link ${driveClass}" style="background: ${link.color}20; border: 1px solid ${link.color}40;">
        <i class="${link.icon}" style="color: ${link.color}"></i> ${link.platform}
      </a>`;
    });
    container.innerHTML = html;
  }

  function truncateUrl(url, maxLen = 55) {
    if (url.length <= maxLen) return url;
    return url.substring(0, maxLen - 3) + "...";
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function (m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderSection(grade, sectionKey, sectionData) {
    let html = `<div class="section-card"><div class="section-header"><h2><i class="fas ${sectionKey === 'personal' ? 'fa-user-circle' : (sectionKey === 'skills' ? 'fa-microscope' : (sectionKey === 'community' ? 'fa-hand-holding-heart' : 'fa-microchip'))}"></i> ${sectionData.title}</h2></div><div class="requirement-list">`;

    for (let i = 0; i < sectionData.items.length; i++) {
      const item = sectionData.items[i];
      const linkKey = item.linkKey;
      const uniqueContainerId = `links_${linkKey}`;

      html += `
        <div class="req-item">
          <div class="req-title">
            <span>📌 ${escapeHtml(item.label)}</span>
            <span class="req-badge">evidence links</span>
          </div>
          <div class="req-desc">${escapeHtml(item.description)}</div>
          <div class="links-container">
            <div id="${uniqueContainerId}" class="links-render-area"></div>
          </div>
        </div>
      `;
    }
    html += `</div></div>`;
    return { html, linkKeys: sectionData.items.map(it => it.linkKey) };
  }

  function renderGradeView(gradeNum) {
    const structure = requirementsStructure[gradeNum];
    if (!structure) {
      document.getElementById("dynamicPortfolioContent").innerHTML = `<div class="full-width-note">Requirements not available.</div>`;
      return;
    }

    const leftPersonal = renderSection(gradeNum, "personal", structure.personal);
    const leftSkills = renderSection(gradeNum, "skills", structure.skills);
    const rightCommunity = renderSection(gradeNum, "community", structure.community);
    const rightScitech = renderSection(gradeNum, "scitechExtra", structure.scitechExtra);

    let leftHtml = leftPersonal.html + leftSkills.html;
    let rightHtml = rightCommunity.html + rightScitech.html;

    let extraNoteHtml = structure.note ? `<div class="full-width-note"><i class="fas fa-info-circle"></i> ${structure.note}</div>` : "";
    let gradReqHtml = structure.gradRequirement ? `<div class="full-width-note" style="background:#e6f4ea;border-left-color:#2e7d64;"><i class="fas fa-certificate"></i> ${structure.gradRequirement}</div>` : "";

    const container = document.getElementById("dynamicPortfolioContent");
    container.innerHTML = `
      <div class="requirements-grid">
        <div>${leftHtml}</div>
        <div>${rightHtml}</div>
      </div>
      ${extraNoteHtml}
      ${gradReqHtml}
    `;

    const allLinkKeys = [...leftPersonal.linkKeys, ...leftSkills.linkKeys, ...rightCommunity.linkKeys, ...rightScitech.linkKeys];
    allLinkKeys.forEach(linkKey => {
      const containerId = `links_${linkKey}`;
      renderLinksForRequirement(linkKey, containerId);
    });
  }

  function initYearTabs() {
    const tabs = document.querySelectorAll(".year-btn");
    tabs.forEach(tab => {
      tab.addEventListener("click", (e) => {
        const grade = parseInt(tab.getAttribute("data-grade"));
        if (!isNaN(grade)) {
          currentGrade = grade;
          tabs.forEach(btn => btn.classList.remove("active"));
          tab.classList.add("active");
          renderGradeView(currentGrade);
        }
      });
    });
  }
